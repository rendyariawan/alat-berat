name: Generate social preview image

on:
  push:
    branches:
      - main
    paths:
      - "assets/og-bmk-agri.svg"
      - "assets/logo-bmk-agri.svg"
      - ".github/workflows/generate-og-image.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install SVG renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Generate 1200x630 PNG
        run: rsvg-convert --width 1200 --height 630 assets/og-bmk-agri.svg --output assets/og-bmk-agri.png

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/og-bmk-agri.png
          if git diff --cached --quiet; then
            echo "Preview image is already up to date."
          else
            git commit -m "Generate social preview image"
            git push
          fi
